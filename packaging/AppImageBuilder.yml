# appimage-builder recipe for restic-box
# Docs: https://appimage-builder.readthedocs.io
#
# Build variants (set via env before running):
#   BUNDLE_RESTIC=1   — download and embed the restic binary
#   BUNDLE_RESTIC=0   — omit restic (user must have it on $PATH)
#   BUNDLE_RCLONE=1   — download and embed the rclone binary
#   RESTIC_VERSION / RESTIC_SHA256 and RCLONE_VERSION / RCLONE_SHA256 can
#                    override the pinned bundled tool versions.
#   VERSION=x.y.z     — sets the AppImage filename version
#
# Usage:
#   cd packaging
#   VERSION=0.1.0 BUNDLE_RESTIC=1 appimage-builder --recipe AppImageBuilder.yml

version: 1

script:
  # Clean previous build
  - rm -rf AppDir

  # Copy app source into AppDir
  - mkdir -p AppDir/usr/share/restic-box
  - cp ../main.py ../restic_*.py AppDir/usr/share/restic-box/
  - cp ../restic-box.desktop AppDir/

  # Icon: render SVG to PNG, then place in AppDir root + hicolor tree
  - rsvg-convert -w 256 -h 256 ../icon.svg -o AppDir/restic-box.png
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp AppDir/restic-box.png AppDir/usr/share/icons/hicolor/256x256/apps/restic-box.png

  # Bundle restic binary when requested
  - |
    if [ "${BUNDLE_RESTIC:-0}" = "1" ]; then
      echo "--- Bundling restic binary ---"
      mkdir -p AppDir/usr/bin
      RESTIC_VER="${RESTIC_VERSION:-0.18.1}"
      RESTIC_SHA256="${RESTIC_SHA256:-680838f19d67151adba227e1570cdd8af12c19cf1735783ed1ba928bc41f363d}"
      ARCH="amd64"
      URL="https://github.com/restic/restic/releases/download/v${RESTIC_VER}/restic_${RESTIC_VER}_linux_${ARCH}.bz2"
      wget -q "$URL" -O /tmp/restic.bz2
      echo "${RESTIC_SHA256}  /tmp/restic.bz2" | sha256sum -c -
      bunzip2 -f /tmp/restic.bz2
      mv /tmp/restic AppDir/usr/bin/restic
      chmod +x AppDir/usr/bin/restic
    fi

  # Bundle rclone binary when requested
  - |
    if [ "${BUNDLE_RCLONE:-0}" = "1" ]; then
      echo "--- Bundling rclone binary ---"
      mkdir -p AppDir/usr/bin
      RCLONE_VER="${RCLONE_VERSION:-1.74.1}"
      RCLONE_SHA256="${RCLONE_SHA256:-67df3059a6233b6e32e604bcd637654bb294ff86291b65ede77123e94818d911}"
      RCLONE_URL="${RCLONE_URL:-https://downloads.rclone.org/v${RCLONE_VER}/rclone-v${RCLONE_VER}-linux-amd64.zip}"
      wget -q "$RCLONE_URL" -O /tmp/rclone.zip
      echo "${RCLONE_SHA256}  /tmp/rclone.zip" | sha256sum -c -
      python3 -c "import zipfile; z=zipfile.ZipFile('/tmp/rclone.zip'); n=next(p for p in z.namelist() if p.endswith('/rclone')); open('/tmp/rclone','wb').write(z.read(n))"
      mv /tmp/rclone AppDir/usr/bin/rclone
      chmod +x AppDir/usr/bin/rclone
    fi

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.shikaku2.restic-box
    name: restic-box
    icon: restic-box
    version: !ENV ${VERSION:-0.1.0}
    exec: usr/bin/python3
    exec_args: "$APPDIR/usr/share/restic-box/main.py $@"

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x871920D1991BC93C'
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - python3-cairo
      - gir1.2-gtk-3.0
      - gir1.2-appindicator3-0.1
      - libgtk-3-0
      - libglib2.0-0
      - libcairo2
      - libdbus-1-3
      - libdbus-glib-1-2
    exclude:
      - adwaita-icon-theme
      - humanity-icon-theme
      - ubuntu-mono
      - hicolor-icon-theme

  files:
    exclude:
      - usr/share/doc
      - usr/share/man
      - usr/share/locale
      - usr/share/X11/locale
      - usr/lib/python3/dist-packages/test
      - usr/lib/python3/dist-packages/tests

  runtime:
    env:
      APPDIR_LIBRARY_PATH: "$APPDIR/usr/lib/x86_64-linux-gnu:$APPDIR/usr/lib"
      GI_TYPELIB_PATH: "$APPDIR/usr/lib/x86_64-linux-gnu/girepository-1.0"
      GSETTINGS_SCHEMA_DIR: "$APPDIR/usr/share/glib-2.0/schemas"

  # Skip automated test — tray apps need a running desktop session
  test:
    debian:
      image: ubuntu:22.04
      command: "python3 --version"
      use_host_x: false

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None
  file_name: !ENV restic-box${BUNDLE_SUFFIX}-${VERSION}-x86_64.AppImage
