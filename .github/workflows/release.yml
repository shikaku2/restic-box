name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - bundle_restic: '0'
            bundle_suffix: ''
          - bundle_restic: '1'
            bundle_suffix: '-bundled'

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-gi python3-gi-cairo python3-cairo \
            gir1.2-gtk-3.0 gir1.2-appindicator3-0.1 \
            libgtk-3-0 libglib2.0-0 libcairo2 \
            libfuse2 fuse wget bzip2

      - name: Enable FUSE (required for AppImage tooling)
        run: |
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse
          sudo chown root:$USER /dev/fuse

      - name: Install appimage-builder
        run: pip install appimage-builder

      - name: Cache appimage-builder apt packages
        uses: actions/cache@v4
        with:
          path: packaging/appimage-builder-cache
          key: appimage-builder-${{ hashFiles('packaging/AppImageBuilder.yml') }}
          restore-keys: appimage-builder-

      - name: Build AppImage
        working-directory: packaging
        env:
          VERSION: ${{ github.ref_name }}
          BUNDLE_RESTIC: ${{ matrix.bundle_restic }}
          BUNDLE_SUFFIX: ${{ matrix.bundle_suffix }}
        run: appimage-builder --recipe AppImageBuilder.yml --skip-tests

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage${{ matrix.bundle_suffix }}
          path: packaging/*.AppImage

  release:
    needs: build-appimage
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: appimage*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
          generate_release_notes: true
